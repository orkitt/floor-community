name: floor_community
description: >
  The typesafe, reactive, and lightweight SQLite abstraction for your Flutter
  applications. This library is the runtime dependency.
version: 1.0.0-community.1
homepage: https://github.com/orkitt/floor-community
repository: https://github.com/orkitt/floor-community
issue_tracker: https://github.com/orkitt/floor-community/issues
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  collection: ^1.19.1

  flutter:
    sdk: flutter
  meta: ^1.18.0
  path: ^1.9.1
  sqflite: ^2.4.2
  sqflite_common: ^2.5.11
  sqflite_common_ffi: ^2.3.5
  sqflite_common_ffi_web: ^1.0.0
  sqlparser: ^0.41.0

dev_dependencies:
  build_runner: ^2.7.0
  floor_generator_community:
    path: ../floor_generator_community
  flutter_test:
    sdk: flutter
  matcher: ^0.12.17
  mockito: ^5.5.0
