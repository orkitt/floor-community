name: example
description: "This is an example on how to use the typesafe, reactive and
  lightweight SQLite abstraction within your Flutter applications."
homepage: https://github.com/orkitt/floor-community
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  floor_community:
    path: ../floor_community/
  cupertino_icons: ^1.0.8
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  analyzer: ^7.7.0
  build_runner: ^2.7.0
  floor_generator_community:
    path: ../floor_generator_community/

flutter:
  uses-material-design: true
